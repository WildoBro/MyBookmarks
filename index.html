	// Sort the bookmarks by Title -> Category -> Environment

			 a.category.localeCompare(b.category) ||

  function fuzzyScore(str, query) {
    str = str.toLowerCase();
    query = query.toLowerCase();
    if (!query) return { score: 1, indices: [] };

    const terms = query.split(/\s+/).filter(t => t.length > 0);
    let totalScore = 0;
    let allIndices = [];

    for (const term of terms) {
      // Find best fuzzy match for this term anywhere in str
      let bestScore = 0, bestIndices = null;

      for (let startIdx = 0; startIdx <= str.length - term.length; startIdx++) {
        let si = startIdx, qi = 0, termScore = 0, termIndices = [];

        while (si < str.length && qi < term.length) {
          if (str[si] === term[qi]) {
            termScore += (si === 0 || str[si-1] === ' ' || str[si-1] === '.') ? 3 : 1;
            termIndices.push(si);
            qi++;
          }
          si++;
        }

        if (qi === term.length && termScore > bestScore) {
          bestScore = termScore;
          bestIndices = termIndices;
        }
      }

      if (!bestIndices) return null; // term not found anywhere
      totalScore += bestScore;
      allIndices.push(...bestIndices);
    }

    return {
      score: totalScore,
      indices: [...new Set(allIndices)].sort((a, b) => a - b)
    };
  }



  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlight(text, indices) {
    if (!indices || !indices.length) return esc(text);
    const iSet = new Set(indices);
    return [...text].map((c, i) =>
      iSet.has(i) ? `<span class="match-highlight">${esc(c)}</span>` : esc(c)
    ).join('');
  }

  function getFavicon(url) {
    try {
      const host = new URL(url).hostname;
      return `https://www.google.com/s2/favicons?domain=${host}&sz=32`;
    } catch { return ''; }
  }

  function getFaviconFallback(url) {
    try {
      const host = new URL(url).hostname;
      return `https://icons.duckduckgo.com/ip3/${host}.ico`;
    } catch { return ''; }
  }

  // After render, patch any broken favicons with DDG fallback
  function patchFavicons() {
    document.querySelectorAll('.bm-favicon[data-url]').forEach(img => {
      if (img.dataset.patched) return;
      img.dataset.patched = '1';
      img.addEventListener('error', function() {
        const fb = getFaviconFallback(img.dataset.url || '');
        if (fb && img.src !== fb) {
          img.src = fb;
          img.addEventListener('error', () => { img.style.display = 'none'; }, { once: true });
        } else {
          img.style.display = 'none';
        }
      }, { once: true });
    });
  }

  function buildRow(bm, i, titleHL, isActive) {
    const displayUrl = bm.url.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '');
    const envKey  = (bm.env || '').toLowerCase();
    const envCls  = envKey ? ` env-${envKey}` : '';
    const envBadge = envKey
      ? `<span class="bm-env ${envKey}">${esc(bm.env.toUpperCase())}</span>`
      : `<span class="bm-env none"></span>`;
    return `
      <a class="bookmark${isActive ? ' active' : ''}${envCls}" href="${esc(bm.url)}" data-idx="${i}">
        <div class="bm-index">${i+1}</div>
        <img class="bm-favicon" src="${bm.icon ?? getFavicon(bm.url)}" data-url="${esc(bm.url)}" alt="">
        <div class="bm-info">
          <div class="bm-title">${titleHL}</div>
          <div class="bm-url">${esc(displayUrl)}</div>
        </div>
        <div class="bm-badges">
          ${envBadge}
          <span class="bm-cat">${esc(bm.category||'')}</span>
        </div>
      </a>`;
  }

  function attachClicks() {
    document.querySelectorAll('.bookmark').forEach(el =>
      el.addEventListener('click', e => { e.preventDefault(); window.location.href = el.href; })
    );
    patchFavicons();
  }

  function renderList(items, query) {
    filtered = items;
    activeIdx = items.length ? 0 : -1;
    const container = document.getElementById('results');
    const empty     = document.getElementById('empty');
    if (!items.length) {
      container.innerHTML = ''; empty.style.display = 'block'; empty.textContent = 'no matches'; return;
    }
    empty.style.display = 'none';
    container.innerHTML = items.map((bm, i) => {
      const m = query ? fuzzyScore(bm.title, query) : null;
      return buildRow(bm, i, m ? highlight(bm.title, m.indices) : esc(bm.title), i === 0);
    }).join('');
    attachClicks();
  }

  function setActive(idx) {
    const els = document.querySelectorAll('.bookmark');
    if (activeIdx >= 0 && els[activeIdx]) els[activeIdx].classList.remove('active');
    activeIdx = Math.max(0, Math.min(idx, filtered.length - 1));
    if (els[activeIdx]) { els[activeIdx].classList.add('active'); els[activeIdx].scrollIntoView({ block: 'nearest' }); }
  }

  renderList(bookmarks, '');

  // ── Search ─────────────────────────────────────────────────────
  const searchEl = document.getElementById('search');

  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim();
    if (!q) { renderList(bookmarks, ''); return; }
    const scored = bookmarks.map(bm => {
      const combined = [bm.title, ...(bm.tags||[]), bm.category||'', bm.env||'', bm.url||''].join(' ');
      const m = fuzzyScore(combined, q);
      return m ? { bm, score: m.score, titleIdx: fuzzyScore(bm.title, q)?.indices || [] } : null;
    }).filter(Boolean).sort((a,b) => b.score - a.score);

    filtered  = scored.map(s => s.bm);
    activeIdx = filtered.length ? 0 : -1;
    const container = document.getElementById('results');
    const empty     = document.getElementById('empty');
    if (!filtered.length) { container.innerHTML = ''; empty.style.display = 'block'; empty.textContent = 'no matches'; return; }
    empty.style.display = 'none';
    container.innerHTML = scored.map(({ bm, titleIdx }, i) =>
      buildRow(bm, i, highlight(bm.title, titleIdx), i === 0)
    ).join('');
    attachClicks();
  });

  // ── Keyboard ───────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const inModal = document.getElementById('modal-overlay').classList.contains('open');

    if (inModal) {
      if (e.key === 'Escape') closeModal();
      return;
    }

    if (document.activeElement !== searchEl && e.key === 'a' && !e.ctrlKey && !e.metaKey) {
      openModal(); return;
    }

    if (document.activeElement !== searchEl && e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
      searchEl.focus(); return;
    }

    switch (e.key) {
      case 'ArrowDown': e.preventDefault(); setActive(activeIdx + 1); break;
      case 'ArrowUp':   e.preventDefault(); setActive(activeIdx - 1); break;
      case 'Enter':
        if (activeIdx >= 0 && filtered[activeIdx]) {
          const url = filtered[activeIdx].url;
          e.shiftKey ? window.open(url, '_blank') : (window.location.href = url);
        }
        break;
      case 'Escape':
        searchEl.value = '';
        searchEl.dispatchEvent(new Event('input'));
        searchEl.blur();
        break;
    }
  });

  searchEl.focus();

  // ── Add Bookmark Modal ─────────────────────────────────────────
  let selectedIconUrl = null; // null = auto, '' = none, 'https://...' = manual pick
  let iconMode = 'auto';
  
  // ── Smart URL field ────────────────────────────────────────────
  const urlInput = document.getElementById('f-url');
  const urlHint  = document.getElementById('url-hint');
  let urlPrefix = true; // true = prepend https://

  function buildNormalized(raw, usePrefix) {
    raw = raw.trim();
    if (!raw) return '';
    const stripped = raw.replace(/^https?:\/\//i, '').replace(/^www\./i, '').replace(/\/+$/, '');
    return usePrefix ? 'https://' + stripped : stripped;
  }

  function isValidUrl(str) {
    try { new URL(str.includes('://') ? str : 'https://' + str); return true; } catch { return false; }
  }

  function renderHint(hintEl, raw, usePrefix, onToggle, onApply) {
    if (!raw) { hintEl.innerHTML = ''; hintEl.className = ''; return; }
    const normalized = buildNormalized(raw, usePrefix);
    const valid = isValidUrl(normalized);
    if (!valid) { hintEl.textContent = 'invalid URL'; hintEl.className = 'invalid'; return; }
    const showPreview = normalized !== raw.trim();
    hintEl.className = 'valid';
    hintEl.innerHTML =
      (showPreview ? `<span class="url-hint-preview" data-a="apply">${normalized}</span>` : '') +
      `<span class="url-hint-toggle${usePrefix ? '' : ' url-hint-toggle-add'}" data-a="toggle">${usePrefix ? '[− https://]' : '[+ https://]'}</span>`;
    hintEl.querySelector('[data-a="apply"]')?.addEventListener('click', () => onApply(normalized));
    hintEl.querySelector('[data-a="toggle"]')?.addEventListener('click', onToggle);
  }

  function updateUrlHint() {
    renderHint(urlHint, urlInput.value, urlPrefix,
      () => { urlPrefix = !urlPrefix; urlInput.value = buildNormalized(urlInput.value, urlPrefix); updateUrlHint(); if (iconMode === 'auto') previewAutoIcon(); },
      (n)  => { urlInput.value = n; urlPrefix = n.startsWith('https://'); updateUrlHint(); if (iconMode === 'auto') previewAutoIcon(); }
    );
  }

  urlInput.addEventListener('input', () => { updateUrlHint(); if (iconMode === 'auto') previewAutoIcon(); });
  urlInput.addEventListener('blur', () => {
    const raw = urlInput.value.trim();
    if (!raw) return;
    const normalized = buildNormalized(raw, urlPrefix);
    if (isValidUrl(normalized)) urlInput.value = normalized;
    updateUrlHint();
  });

  // ── Smart domain input (icon picker) ──────────────────────────
  const domainInput = document.getElementById('icon-domain-input');
  const domainHint  = document.getElementById('domain-hint');
  let domainPrefix = true;

  function updateDomainHint() {
    renderHint(domainHint, domainInput.value, domainPrefix,
      () => { domainPrefix = !domainPrefix; domainInput.value = buildNormalized(domainInput.value, domainPrefix); updateDomainHint(); },
      (n)  => { domainInput.value = n; domainPrefix = n.startsWith('https://'); updateDomainHint(); }
    );
  }

  domainInput.addEventListener('input', updateDomainHint);
  domainInput.addEventListener('blur', () => {
    const raw = domainInput.value.trim();
    if (!raw) return;
    const normalized = buildNormalized(raw, domainPrefix);
    if (isValidUrl(normalized)) domainInput.value = normalized;
    updateDomainHint();
  });

  // Reset toggle states when modal opens (handled in openModal)


  // ── Category datalist ──────────────────────────────────────────
  function populateCatList() {
    const cats = [...new Set(BOOKMARKS.map(b => b.category).filter(Boolean))].sort();
    const dl = document.getElementById('cat-list');
    dl.innerHTML = cats.map(c => `<option value="${esc(c)}">`).join('');
  }

  function iconSources(url) {
    try {
      const host = new URL(url).hostname;
      return [
        { src: `https://www.google.com/s2/favicons?domain=${host}&sz=64`, label: 'google' },
        { src: `https://icons.duckduckgo.com/ip3/${host}.ico`,            label: 'ddg' },
        { src: `https://www.google.com/s2/favicons?domain=${host}&sz=16`, label: 'google sm' },
      ];
    } catch { return []; }
  }

  function setIconMode(mode) {
    iconMode = mode;
    document.querySelectorAll('.icon-mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === mode)
    );
    document.getElementById('icon-auto-panel').style.display  = mode === 'auto'   ? '' : 'none';
    document.getElementById('icon-manual-panel').style.display = mode === 'manual' ? '' : 'none';
    if (mode === 'none')   selectedIconUrl = '';
    if (mode === 'auto')   { selectedIconUrl = null; previewAutoIcon(); }
    if (mode === 'manual') { selectedIconUrl = null; buildIconGrid(); }
  }

  function previewAutoIcon() {
    const url = document.getElementById('f-url').value.trim();
    const preview = document.getElementById('icon-auto-preview');
    const status  = document.getElementById('icon-auto-status');

    if (!url) {
      preview.innerHTML = '<span id="icon-auto-status">enter a URL above to preview</span>';
      return;
    }

    const sources = iconSources(url);
    if (!sources.length) {
      preview.innerHTML = '<span id="icon-auto-status">invalid URL</span>';
      return;
    }

    preview.innerHTML = '<span id="icon-auto-status">loading…</span>';

    // Try sources in order, show first that loads
    let tried = 0;
    function tryNext() {
      if (tried >= sources.length) {
        preview.innerHTML = '<span id="icon-auto-status">no icon found — try "pick manually"</span>';
        return;
      }
      const { src, label } = sources[tried++];
      const img = new Image();
      img.onload = () => {
        if (img.naturalWidth <= 1) { tryNext(); return; } // blank 1px placeholder
        preview.innerHTML = '';
        const i = document.createElement('img');
        i.src = src; i.width = 24; i.height = 24;
        i.style.borderRadius = '4px';
        const s = document.createElement('span');
        s.id = 'icon-auto-status';
        s.style.cssText = 'font-family:Martian Mono,monospace;font-size:10px;color:var(--muted)';
        s.textContent = `icon found via ${label}`;
        preview.appendChild(i);
        preview.appendChild(s);
      };
      img.onerror = tryNext;
      img.src = src;
    }
    tryNext();
  }



  function addIconTile(grid, src, label, isFetched) {
    const tile = document.createElement('div');
    tile.className = 'icon-tile icon-tile-tall' + (isFetched ? ' fetched-tile' : '');
    if (selectedIconUrl === src) tile.classList.add('selected');
    const img = document.createElement('img');
    img.src = src;
    img.onerror = () => tile.remove();
    const lbl = document.createElement('div');
    lbl.className = 'tile-label';
    lbl.textContent = label;
    tile.appendChild(img);
    tile.appendChild(lbl);
    tile.addEventListener('click', () => {
      document.querySelectorAll('.icon-tile').forEach(t => t.classList.remove('selected'));
      tile.classList.add('selected');
      selectedIconUrl = src;
    });
    grid.appendChild(tile);
  }

  function buildIconGrid() {
    const grid = document.getElementById('icon-grid');
    grid.innerHTML = '';
    const seen = new Set();

    // One tile per unique host from existing bookmarks
    const lbl = document.createElement('div');
    lbl.id = 'icon-grid-label';
    lbl.textContent = 'FROM YOUR BOOKMARKS';
    grid.appendChild(lbl);

    BOOKMARKS.forEach(bm => {
      try {
        const host = new URL(bm.url).hostname;
        if (seen.has(host)) return;
        seen.add(host);
        const src = `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
        const label = host.replace('www.', '').split('.')[0];
        addIconTile(grid, src, label, false);
      } catch {}
    });

    // Also add options for the current URL if set
    const curUrl = document.getElementById('f-url').value.trim();
    if (curUrl) {
      try {
        const host = new URL(curUrl).hostname;
        if (!seen.has(host)) {
          seen.add(host);
          addIconTile(grid, `https://www.google.com/s2/favicons?domain=${host}&sz=64`,
            host.replace('www.','').split('.')[0], false);
          addIconTile(grid, `https://icons.duckduckgo.com/ip3/${host}.ico`, 'ddg', false);
        }
      } catch {}
    }
  }

  function fetchDomainIcons() {
    const raw  = domainInput.value.trim();
    const grid = document.getElementById('icon-grid');
    if (!raw) return;

    const normalized = buildNormalized(raw, domainHttps, domainWww);
    let host;
    try { host = new URL(normalized.includes('://') ? normalized : 'https://' + normalized).hostname; }
    catch { host = raw.replace(/^https?:\/\//i,'').replace(/\/.*$/,''); }

    grid.querySelectorAll('.fetched-tile').forEach(t => t.remove());
    const lbl = document.createElement('div');
    lbl.className = 'icon-grid-label fetched-tile';
    lbl.style.marginTop = '10px';
    lbl.textContent = `FETCHED: ${host}`;
    grid.appendChild(lbl);

    [
      { src: `https://www.google.com/s2/favicons?domain=${host}&sz=64`, label: 'google 64' },
      { src: `https://www.google.com/s2/favicons?domain=${host}&sz=32`, label: 'google 32' },
      { src: `https://icons.duckduckgo.com/ip3/${host}.ico`,            label: 'ddg' },
    ].forEach(({ src, label }) => addIconTile(grid, src, label, true));
  }

  function openModal() {
    iconMode = 'auto';
    selectedIconUrl = null;
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('snippet-wrap').classList.remove('visible');
    document.getElementById('modal-generate').textContent = 'generate snippet →';
    ['f-title','f-url','f-cat','f-tags'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-env').value = '';
    document.getElementById('icon-domain-input').value = '';
    urlHint.textContent = '';
    urlHint.className = '';
    urlHttps = true; urlWww = false;
    domainHint.textContent = '';
    domainHint.className = '';
    domainHttps = true; domainWww = false;
    populateCatList();
    setIconMode('auto');
    setTimeout(() => document.getElementById('f-title').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    searchEl.focus();
  }

  function generateSnippet() {
    const title = document.getElementById('f-title').value.trim();
    const url   = buildNormalized(document.getElementById('f-url').value, urlHttps, urlWww);
    const cat   = document.getElementById('f-cat').value.trim();
    const env   = document.getElementById('f-env').value;
    const tags  = document.getElementById('f-tags').value
      .split(',').map(t => t.trim()).filter(Boolean);

    if (!title || !url) {
      document.getElementById('f-title').style.borderColor = title ? '' : 'rgba(255,80,80,0.6)';
      document.getElementById('f-url').style.borderColor   = url   ? '' : 'rgba(255,80,80,0.6)';
      return;
    }

    const obj = { title, url };
    if (cat)  obj.category = cat;
    if (env)  obj.env = env;
    if (tags.length) obj.tags = tags;

    // Icon: null = auto (omit field), '' = none, string = explicit url
    if (iconMode === 'none') {
      obj.icon = '';
    } else if (iconMode === 'manual' && selectedIconUrl) {
      obj.icon = selectedIconUrl;
    }
    // auto: omit icon field entirely

    const json = JSON.stringify(obj, null, 0);
    document.getElementById('snippet').textContent = json + ',';
    document.getElementById('snippet-wrap').classList.add('visible');
    document.getElementById('modal-generate').textContent = 'regenerate →';

    const copyBtn = document.getElementById('copy-btn');
    copyBtn.textContent = 'copy';
    copyBtn.classList.remove('copied');
  }

  // Mode button clicks
  document.querySelectorAll('.icon-mode-btn').forEach(btn =>
    btn.addEventListener('click', () => setIconMode(btn.dataset.mode))
  );

  document.getElementById('icon-domain-fetch').addEventListener('click', fetchDomainIcons);
  document.getElementById('f-url').addEventListener('keydown', e => {
    fetchDomainIcons();
  });
  document.getElementById('icon-domain-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchDomainIcons();
  });

  document.getElementById('add-btn').addEventListener('click', openModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.getElementById('modal-generate').addEventListener('click', generateSnippet);

  document.getElementById('copy-btn').addEventListener('click', () => {
    const text = document.getElementById('snippet').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'copied ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
    });
  });

  ['f-title','f-url','f-cat','f-tags'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') generateSnippet();
    });
  });
</script>
</body>
</html>
